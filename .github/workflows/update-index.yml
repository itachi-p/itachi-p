name: Update INDEX.md

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**/*.md'
      - 'projects/**/*.md'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate INDEX.md
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M' -d '+9 hours' 2>/dev/null || date -u '+%Y-%m-%d %H:%M')
          {
            echo "# Index"
            echo ""
            echo "> このファイルはGitHub Actionsによって自動更新されます。手動編集は不要です。"
            echo "> 最終更新：${DATE} JST"
            echo ""
            echo "---"
            echo ""
            echo "## docs/"
            echo ""
            echo "| ファイル | 概要 |"
            echo "|---|---|"
          } > INDEX.md

          for f in $(find docs -name "*.md" | grep -v app-ideas.md | sort); do
            filename=$(basename "$f")
            summary=$(grep -m1 '> summary:' "$f" | sed 's/> summary: //' || echo "（summary未記入）")
            echo "| [$filename]($f) | $summary |" >> INDEX.md
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add INDEX.md
          git diff --staged --quiet || git commit -m "chore: auto-update INDEX.md"
          git push