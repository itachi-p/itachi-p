- name: Generate INDEX.md
        run: |
          DATE=$(date -u '+%Y-%m-%d %H:%M' -d '+9 hours' 2>/dev/null || date -u '+%Y-%m-%d %H:%M')
          {
            echo "# Index"
            echo ""
            echo "> このファイルはGitHub Actionsによって自動更新されます。手動編集は不要です。"
            echo "> 最終更新：${DATE} JST"
            echo ""
            echo "---"
            echo ""
            echo "## docs/"
            echo ""
            echo "| ファイル | 概要 |"
            echo "|---|---|"
          } > INDEX.md

          for f in $(find docs -name "*.md" | grep -v app-ideas.md | sort); do
            filename=$(basename "$f")
            summary=$(grep -m1 '> summary:' "$f" | sed 's/> summary: //' || echo "（summary未記入）")
            echo "| [$filename]($f) | $summary |" >> INDEX.md
          done

          {
            echo ""
            echo "## projects/"
            echo ""
            echo "| プロジェクト | 概要 |"
            echo "|---|---|"
          } >> INDEX.md

          for d in $(find projects -mindepth 1 -maxdepth 1 -type d | sort); do
            dirname=$(basename "$d")
            logfile="$d/process-log.md"
            if [ -f "$logfile" ]; then
              summary=$(grep -m1 '> summary:' "$logfile" | sed 's/> summary: //' || echo "（summary未記入）")
              echo "| [$dirname]($logfile) | $summary |" >> INDEX.md
            else
              echo "| [$dirname]($d) | （process-log.md未作成） |" >> INDEX.md
            fi
          done
          